<script src="../../js/app.js"></script>
<script>
window.toolConfig = {
  filename: 'Writing-Prompt',
  fields: [
    { name: 'type', label: 'Article Type', type: 'select', options: [
      { value: 'Blog Post', label: 'Blog Post' },
      { value: 'Academic Essay', label: 'Academic Essay' },
      { value: 'News Article', label: 'News Article' },
      { value: 'Fiction Story', label: 'Fiction Story' },
      { value: 'Technical Doc', label: 'Technical Doc' },
      { value: 'Product Review', label: 'Product Review' },
      { value: 'Social Media Long-form', label: 'Social Media Long-form' }
    ], hint: 'Different types have different structures and writing norms.' },
    { name: 'topic', label: 'Article Topic', type: 'text', placeholder: 'e.g. Breakthroughs and challenges of AI in medical diagnosis', hint: 'The more specific, the more accurate the AI output.' },
    { name: 'audience', label: 'Target Readers', type: 'text', placeholder: 'e.g. General public, industry practitioners, academic researchers', hint: 'Determines content depth, terminology, and case selection.' },
    { name: 'tone', label: 'Tone & Style', type: 'radio', options: [
      { value: 'Professional & Rigorous', label: 'Professional & Rigorous' },
      { value: 'Light & Lively', label: 'Light & Lively' },
      { value: 'Objective & Neutral', label: 'Objective & Neutral' },
      { value: 'Deep & Speculative', label: 'Deep & Speculative' },
      { value: 'Storytelling', label: 'Storytelling' }
    ], hint: 'Tone should match the article type and reader expectations.' },
    { name: 'length', label: 'Target Word Count', type: 'text', placeholder: 'e.g. 2,000 words / 3,000-5,000 words', hint: 'Provide a range or exact number.' },
    { name: 'keywords', label: 'Core / SEO Keywords', type: 'text', placeholder: 'AI healthcare, deep learning, diagnostic accuracy', hint: 'Helps the AI naturally integrate keywords for better SEO.' },
    { name: 'outline', label: 'Desired Outline / Structure', type: 'textarea', placeholder: '1. Introduction: current status\n2. Core breakthroughs\n3. Real-world cases\n4. Challenges ahead\n5. Future outlook\n6. Conclusion', hint: 'Provide your preferred article structure.', rows: 6 },
    { name: 'refs', label: 'References / Background Info', type: 'textarea', placeholder: 'Paste relevant research links, data, background materials...', hint: 'Reference materials help the AI generate more accurate, evidence-based content.', rows: 4 },
    { name: 'lang', label: 'Output Language', type: 'radio', options: [
      { value: 'English', label: 'English' },
      { value: 'Chinese', label: 'Chinese' },
      { value: 'Bilingual', label: 'Bilingual' }
    ] }
  ],
  template: function(v) {
    var ol = (v.outline || '').split('\n').filter(function(l){return l.trim();});
    return '# Writing Prompt\n\n> Please write a high-quality article based on the following requirements.\n\n## Article Settings\n- **Type**: ' + (v.type || 'Not provided; please infer from topic.') + '\n- **Topic**: ' + (v.topic || 'Not provided; please infer from context and supplement.') + '\n- **Target Readers**: ' + (v.audience || 'Not provided; please infer from topic.') + '\n- **Tone & Style**: ' + (v.tone || 'Not provided') + '\n- **Target Length**: ' + (v.length || 'Not provided; please infer from topic.') + '\n- **Output Language**: ' + (v.lang || 'English') + '\n\n## Keyword Requirements\n' + (v.keywords ? 'Please naturally integrate the following keywords: ' + v.keywords : 'No specific keyword requirements.') + '\n\n## Article Structure\n' + (ol.length ? ol.map(function(l, i){ return (i+1) + '. ' + l.trim(); }).join('\n') : 'Not provided; please design a reasonable structure based on the topic.') + '\n\n## Reference Info\n' + (v.refs || 'None provided; please generate based on your knowledge base.') + '\n\n## Output Requirements\n1. Strictly follow the above structure and length.\n2. Start with a hook and end with a strong conclusion.\n3. Ensure smooth transitions and clear logic between paragraphs.\n4. Use specific cases or data to support arguments where applicable.\n5. Avoid clichés; maintain originality and readability.\n6. After completion, self-check for factual accuracy, grammar, and logical consistency.';
  }
};
</script>
