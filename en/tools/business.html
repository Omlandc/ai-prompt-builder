<script src="../../js/app.js"></script>
<script>
window.toolConfig = {
  filename: 'Business-Plan-Prompt',
  fields: [
    { name: 'doctype', label: 'Document Type', type: 'select', options: [
      { value: 'Investor Pitch Deck', label: 'Investor Pitch Deck' },
      { value: 'Internal Business Plan', label: 'Internal Business Plan' },
      { value: 'Partnership Proposal', label: 'Partnership Proposal' },
      { value: 'Market Research Report', label: 'Market Research Report' }
    ] },
    { name: 'industry', label: 'Industry', type: 'text', placeholder: 'e.g. SaaS enterprise services / new energy / cross-border e-commerce', hint: 'Industry determines analysis framework and key metrics.' },
    { name: 'audience', label: 'Target Readers', type: 'select', options: [
      { value: 'VC / Angel Investors', label: 'VC / Angel Investors' },
      { value: 'Enterprise Partners', label: 'Enterprise Partners' },
      { value: 'Banks / Financial Institutions', label: 'Banks / Financial Institutions' },
      { value: 'Internal Management', label: 'Internal Management' }
    ], hint: 'Different readers care about completely different things.' },
    { name: 'product', label: 'Core Product / Service', type: 'textarea', placeholder: 'e.g. AI-powered tax SaaS platform for SMBs, automatically recognizing invoices and generating reports', hint: 'One sentence explaining what you do and for whom.', rows: 3 },
    { name: 'model', label: 'Business Model', type: 'select', options: [
      { value: 'SaaS Subscription', label: 'SaaS Subscription' },
      { value: 'Marketplace', label: 'Marketplace' },
      { value: 'E-commerce', label: 'E-commerce' },
      { value: 'Ad Monetization', label: 'Ad Monetization' },
      { value: 'On-demand Service', label: 'On-demand Service' },
      { value: 'Hardware + Service', label: 'Hardware + Service' },
      { value: 'Licensing / Franchise', label: 'Licensing / Franchise' }
    ], hint: 'A clear business model is the core of the plan.' },
    { name: 'market', label: 'Market Size & Trends', type: 'textarea', placeholder: 'e.g. China SMB tax service market ~200B CNY, 15% YoY growth, policy-driven digital transformation...', hint: 'Support market judgment with TAM/SAM/SOM or authoritative data.', rows: 4 },
    { name: 'advantage', label: 'Core Competitive Advantages', type: 'textarea', placeholder: 'e.g.\n- Tech barrier: proprietary OCR 99.5% accuracy\n- First-mover: already serving 5,000+ enterprises\n- Network effects: more users, better model', hint: 'Why you? Why now? Why will you win?', rows: 4 },
    { name: 'finance', label: 'Financial Projections / Funding Needs', type: 'textarea', placeholder: 'e.g. Seeking Series A 10M USD for 10% equity, funds for R&D and market expansion...', hint: 'For investor decks, this is what investors care about most.', rows: 4 },
    { name: 'team', label: 'Core Team', type: 'textarea', placeholder: 'e.g. CEO serial entrepreneur, CTO ex-big-tech architect, CMO 10 years B2B marketing...', hint: 'Investors bet on people; show complementary skills and execution ability.', rows: 3 }
  ],
  template: function(v) {
    return '# Business Plan Prompt\n\n> Please generate a professional ' + (v.doctype || 'business plan') + ' based on the following information.\n\n## Document Settings\n- **Document Type**: ' + (v.doctype || 'Not provided') + '\n- **Target Readers**: ' + (v.audience || 'Not provided') + '\n- **Industry**: ' + (v.industry || 'Not provided') + '\n- **Business Model**: ' + (v.model || 'Not provided') + '\n\n## Product & Service\n' + (v.product || 'Not provided; please infer from other info.') + '\n\n## Market Analysis\n' + (v.market || 'Not provided; please infer reasonable market size and trends from the industry.') + '\n\n## Competitive Advantages\n' + (v.advantage || 'Not provided; please infer reasonable competitive moats from the product and model.') + '\n\n## Team\n' + (v.team || 'Not provided; please infer a reasonable team setup.') + '\n\n## Finance & Funding\n' + (v.finance || 'Not provided; please infer a reasonable financial projection framework from the business model.') + '\n\n## Output Requirements\n1. Follow standard business plan structure: Executive Summary, Company Overview, Product/Service, Market Analysis, Competitive Landscape, Business Model, Marketing Strategy, Operations, Management Team, Financial Projections, Funding Needs, Risk Analysis, Appendix.\n2. Executive summary must be concise and compelling enough to win the reader in 2 minutes.\n3. Market analysis must be data-backed, citing authoritative sources.\n4. Competitive analysis presented in matrix or comparison table format.\n5. Financial projections provide 3-5 year revenue, cost, profit, and cash flow framework.\n6. Language should be professional, confident but not boastful, data-driven.\n7. Mark placeholders where real data needs to be filled in.';
  }
};
</script>
