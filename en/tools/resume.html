<script src="../../js/app.js"></script>
<script>
window.toolConfig = {
  filename: 'Resume-Prompt',
  fields: [
    { name: 'job', label: 'Target Job Title', type: 'text', placeholder: 'e.g. Senior Product Manager (SaaS)', hint: 'Precise titles help match keywords.' },
    { name: 'industry', label: 'Target Industry', type: 'text', placeholder: 'e.g. Internet / Fintech / Manufacturing', hint: 'Different industries focus on different resume aspects.' },
    { name: 'years', label: 'Years of Experience', type: 'text', placeholder: 'e.g. 5 years / New graduate', hint: 'Experience level affects narrative focus.' },
    { name: 'skills', label: 'Core Skills', type: 'textarea', placeholder: 'e.g.\n- Product planning & requirements analysis\n- SQL/Python data analysis\n- Agile project management\n- UX design', hint: 'List hard and soft skills most relevant to the target role.', rows: 4 },
    { name: 'edu', label: 'Education', type: 'text', placeholder: 'e.g. BS Computer Science, XYZ University', hint: 'Briefly mention degree, major, and school tier.' },
    { name: 'highlights', label: 'Achievements / Projects', type: 'textarea', placeholder: 'e.g.\n- Led user growth project; DAU increased from 100K to 500K\n- Optimized recommendation algorithm; conversion rate up 23%', hint: 'Quantify results with data — the most attractive part of a resume.', rows: 5 },
    { name: 'company', label: 'Target Company Type', type: 'select', options: [
      { value: 'Big Tech / Public', label: 'Big Tech / Public' },
      { value: 'Startup', label: 'Startup' },
      { value: 'Foreign Enterprise', label: 'Foreign Enterprise' },
      { value: 'State-owned / Public Sector', label: 'State-owned / Public Sector' },
      { value: 'Freelance / Remote', label: 'Freelance / Remote' }
    ], hint: 'Company type affects resume style and emphasis.' },
    { name: 'style', label: 'Resume Style', type: 'radio', options: [
      { value: 'Clean & Professional', label: 'Clean & Professional' },
      { value: 'Data-Driven', label: 'Data-Driven' },
      { value: 'Creative Standout', label: 'Creative Standout' },
      { value: 'Academic Rigorous', label: 'Academic Rigorous' }
    ], hint: 'Style should match industry culture and role characteristics.' },
    { name: 'lang', label: 'Resume Language', type: 'radio', options: [
      { value: 'English', label: 'English' },
      { value: 'Chinese', label: 'Chinese' },
      { value: 'Bilingual', label: 'Bilingual' }
    ] }
  ],
  template: function(v) {
    return '# Resume Optimization Prompt\n\n> Please help me generate/optimize a resume for the target role based on the following information.\n\n## Job Target\n- **Target Role**: ' + (v.job || 'Not provided; please infer from other info.') + '\n- **Target Industry**: ' + (v.industry || 'Not provided') + '\n- **Target Company Type**: ' + (v.company || 'Not provided') + '\n- **Experience**: ' + (v.years || 'Not provided') + '\n- **Education**: ' + (v.edu || 'Not provided; please infer from other info.') + '\n- **Resume Language**: ' + (v.lang || 'English') + '\n- **Style Preference**: ' + (v.style || 'Not provided') + '\n\n## Core Skills\n' + (v.skills || 'Not provided; please infer reasonable skills from the target role.') + '\n\n## Achievements & Projects\n' + (v.highlights || 'Not provided; please infer reasonable achievements from the target role.') + '\n\n## Output Requirements\n1. Generate a complete resume text including: personal info, career objective, education, work experience, projects, core skills, and self-evaluation.\n2. Use the STAR method (Situation-Task-Action-Result) for work experience and projects, quantifying results with data.\n3. Optimize keyword matching against typical job descriptions for the target role.\n4. Use concise, powerful language; avoid vague descriptions.\n5. If there are obvious weaknesses, provide suggestions to mitigate them.\n6. Output in a format ready to copy into Word or a Markdown editor.';
  }
};
</script>
<script src="../../js/tool-engine.js"></script>
