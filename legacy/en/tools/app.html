<script src="../../js/app.js"></script>
<script>
window.toolConfig = {
  filename: 'App-Prompt',
  fields: [
    { name: 'name', label: 'App Name', type: 'text', placeholder: 'e.g. Mint Budget', hint: 'The formal product name.' },
    { name: 'atype', label: 'App Type', type: 'select', options: [
      { value: 'Productivity Tool', label: 'Productivity Tool' },
      { value: 'Social Commerce', label: 'Social Commerce' },
      { value: 'Content & News', label: 'Content & News' },
      { value: 'Online Education', label: 'Online Education' },
      { value: 'Health & Medical', label: 'Health & Medical' },
      { value: 'Gaming & Entertainment', label: 'Gaming & Entertainment' },
      { value: 'Finance', label: 'Finance' }
    ], hint: 'Type determines core feature framework and UX priorities.' },
    { name: 'platform', label: 'Target Platforms', type: 'checkbox', options: [
      { value: 'iOS', label: 'iOS' },
      { value: 'Android', label: 'Android' },
      { value: 'Mini Program', label: 'Mini Program' },
      { value: 'HarmonyOS', label: 'HarmonyOS' },
      { value: 'Cross-platform (Flutter/RN)', label: 'Cross-platform (Flutter/RN)' }
    ], hint: 'Different platforms have different design guidelines and review requirements.' },
    { name: 'users', label: 'Target Users', type: 'text', placeholder: 'e.g. 22-35 new professionals who want to build a budgeting habit', hint: 'User personas directly impact feature prioritization and interaction design.' },
    { name: 'features', label: 'Core Features', type: 'table', columns: [
      { label: 'Feature Module', placeholder: 'e.g. Smart Budgeting' },
      { label: 'Description', placeholder: 'Brief description' },
      { label: 'Priority', placeholder: 'P0/P1/P2' }
    ], defaultRows: 4, hint: 'Organize core feature modules in a table.' },
    { name: 'design', label: 'Design Guideline Preference', type: 'select', options: [
      { value: 'iOS Human Interface', label: 'iOS Human Interface' },
      { value: 'Material Design', label: 'Material Design' },
      { value: 'Custom Brand Style', label: 'Custom Brand Style' },
      { value: 'No Preference', label: 'No Preference' }
    ], hint: 'Guidelines affect UI component selection and interaction patterns.' },
    { name: 'competitors', label: 'Competitor References', type: 'text', placeholder: 'e.g. YNAB, PocketGuard, MoneyWiz', hint: 'Understanding competitors helps with differentiated positioning.' },
    { name: 'store', label: 'Generate App Store Listing?', type: 'radio', options: [
      { value: 'Yes', label: 'Yes' },
      { value: 'No', label: 'No' }
    ], hint: 'Store listing copy directly impacts conversion rates.' }
  ],
  template: function(v) {
    var pl = Array.isArray(v.platform) ? v.platform.join(', ') : (v.platform || 'Not provided');
    var ft = '';
    if (Array.isArray(v.features) && v.features.length) {
      ft = '| Feature Module | Description | Priority |\n|---|---|---|\n' + v.features.map(function(r){ return '| ' + (r[0]||'') + ' | ' + (r[1]||'') + ' | ' + (r[2]||'') + ' |'; }).join('\n');
    } else {
      ft = 'Not provided; please infer a reasonable feature list from the app type.';
    }
    return '# App Development Prompt\n\n> Please generate an App product requirements and development辅助 document based on the following information.\n\n## Product Overview\n- **App Name**: ' + (v.name || 'Not provided; please infer from context.') + '\n- **Type**: ' + (v.atype || 'Not provided') + '\n- **Target Platforms**: ' + pl + '\n- **Target Users**: ' + (v.users || 'Not provided; please infer from type.') + '\n- **Design Guideline**: ' + (v.design || 'Not provided') + '\n\n## Core Features\n' + ft + '\n\n## Competitor References\n' + (v.competitors || 'Not provided; please recommend relevant competitors based on type.') + '\n\n## Output Requirements\n1. Generate a product requirements document (PRD) summary, including information architecture, core page flows, states and exception handling.\n2. Provide information structure and interaction notes for key screens.\n3. ' + (v.store==='Yes' ? 'Generate app store title, subtitle, keywords, description copy, and update log template.' : 'No app store copy needed.') + '\n4. Provide technical stack recommendations (frontend framework, backend service, database, third-party SDKs).\n5. List platform review considerations and common rejection reasons.\n6. Provide data tracking and growth strategy recommendations.\n7. Use professional, clear language suitable for product, design, and engineering teams.';
  }
};
</script>
