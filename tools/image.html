<script src="../js/app.js"></script>
<script>
window.toolConfig = {
  filename: 'AI绘画提示词',
  fields: [
    { name: 'subject', label: '画面主题 / 主体', type: 'text', placeholder: '例如：一位穿着未来风格装甲的宇航员站在火星地表', hint: '描述图像的核心主体与场景。' },
    { name: 'style', label: '艺术风格', type: 'select', options: [
      { value: '写实摄影', label: '写实摄影' },
      { value: '动漫插画', label: '动漫插画' },
      { value: '油画', label: '油画' },
      { value: '水彩', label: '水彩' },
      { value: '赛博朋克', label: '赛博朋克' },
      { value: '像素艺术', label: '像素艺术' },
      { value: '3D渲染', label: '3D渲染' },
      { value: '水墨画', label: '水墨画' },
      { value: '波普艺术', label: '波普艺术' }
    ], hint: '选择期望的整体视觉风格。' },
    { name: 'composition', label: '构图方式', type: 'radio', options: [
      { value: '特写', label: '特写' },
      { value: '中景', label: '中景' },
      { value: '广角/全景', label: '广角/全景' },
      { value: '对称构图', label: '对称构图' },
      { value: '三分法', label: '三分法' },
      { value: '引导线', label: '引导线' },
      { value: '框架构图', label: '框架构图' }
    ], hint: '构图决定了画面的视觉重心与空间感。' },
    { name: 'lighting', label: '光线类型', type: 'select', options: [
      { value: '自然日光', label: '自然日光' },
      { value: '黄金时刻', label: '黄金时刻' },
      { value: '伦勃朗光', label: '伦勃朗光' },
      { value: '霓虹/赛博光', label: '霓虹/赛博光' },
      { value: '逆光/剪影', label: '逆光/剪影' },
      { value: '柔光箱/棚拍', label: '柔光箱/棚拍' },
      { value: '烛光/火光', label: '烛光/火光' },
      { value: '阴天漫射光', label: '阴天漫射光' }
    ], hint: '光线是营造氛围与质感的关键。' },
    { name: 'color', label: '色彩氛围', type: 'text', placeholder: '例如：暖橙色调，高饱和度，电影感配色', hint: '可描述色调、饱和度、对比度等。' },
    { name: 'details', label: '细节与质感要求', type: 'textarea', placeholder: '例如：装甲表面有磨损划痕，背景有远处废墟城市，天空有两颗卫星', hint: '补充主体材质、背景元素、环境细节等。', rows: 5 },
    { name: 'exclude', label: '需要排除的元素', type: 'text', placeholder: '例如：文字、水印、畸形手指、低质量', hint: '列出你不希望出现在画面中的内容。' },
    { name: 'ratio', label: '画面比例 / 用途', type: 'select', options: [
      { value: '1:1 (头像/社交媒体)', label: '1:1 (头像/社交媒体)' },
      { value: '16:9 (壁纸/横屏)', label: '16:9 (壁纸/横屏)' },
      { value: '9:16 (手机壁纸/竖屏)', label: '9:16 (手机壁纸/竖屏)' },
      { value: '4:3 (演示/印刷)', label: '4:3 (演示/印刷)' },
      { value: '21:9 (超宽屏)', label: '21:9 (超宽屏)' }
    ] },
    { name: 'params', label: '附加参数（如适用）', type: 'text', placeholder: '例如：--ar 16:9 --v 6 --s 750 --q 2', hint: '针对Midjourney等模型的技术参数。' }
  ],
  template: function(v) {
    return '# AI绘画提示词\n\n> 请根据以下描述生成图像，或将其直接作为提示词用于图像生成模型。\n\n## 主体描述\n' + (v.subject || '暂无，请根据其他信息自动判断并补充。') + '\n\n## 视觉设定\n- **艺术风格**：' + (v.style || '暂无，请根据主题自动判断并补充。') + '\n- **构图方式**：' + (v.composition || '暂无') + '\n- **光线类型**：' + (v.lighting || '暂无，请根据氛围自动判断并补充。') + '\n- **色彩氛围**：' + (v.color || '暂无，请根据风格自动判断并补充。') + '\n- **画面比例 / 用途**：' + (v.ratio || '暂无') + '\n\n## 细节与质感\n' + (v.details || '暂无，请根据主体自动补充合理细节。') + '\n\n## 排除元素\n' + (v.exclude ? '画面中不得出现：' + v.exclude : '暂无特定排除要求。') + '\n\n## 模型参数\n' + (v.params || '请根据上述描述和常用最佳实践推荐合适的参数设置。') + '\n\n## 额外要求\n1. 画面清晰，细节丰富，无低质量或畸形元素。\n2. 风格统一，光影逻辑自洽。\n3. 如生成多幅变体，请保持主题一致，探索不同构图或光影变化。';
  }
};
</script>
